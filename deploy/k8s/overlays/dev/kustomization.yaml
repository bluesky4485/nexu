apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nexu-dev

resources:
  - ../../base

namePrefix: ""

patches:
  # API: single replica, lower resources
  - target:
      kind: Deployment
      name: nexu-api
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nexu-api
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: api
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 256Mi

  # Web: single replica
  - target:
      kind: Deployment
      name: nexu-web
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nexu-web
      spec:
        replicas: 1

  # Gateway: lower resources
  - target:
      kind: Deployment
      name: gateway-pool
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gateway-pool
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: gateway
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: "1"
                    memory: 2Gi

  # HPA: lower max
  - target:
      kind: HorizontalPodAutoscaler
      name: gateway-pool
    patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: gateway-pool
      spec:
        minReplicas: 1
        maxReplicas: 3

images:
  - name: nexu-api
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/nexu-api
    newTag: dev-latest
  - name: nexu-web
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/nexu-web
    newTag: dev-latest
  - name: nexu-gateway
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/nexu-gateway
    newTag: dev-latest

configMapGenerator:
  - name: nexu-config
    behavior: merge
    literals:
      - WEB_URL=https://dev.nexu.example.com
      - BETTER_AUTH_URL=https://dev-api.nexu.example.com
