apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nexu

resources:
  - ../../base

patches:
  # Gateway: higher resources for production
  - target:
      kind: Deployment
      name: gateway-pool
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gateway-pool
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: gateway
                resources:
                  requests:
                    cpu: "1"
                    memory: 2Gi
                  limits:
                    cpu: "2"
                    memory: 4Gi

  # HPA: production scaling
  - target:
      kind: HorizontalPodAutoscaler
      name: gateway-pool
    patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: gateway-pool
      spec:
        minReplicas: 2
        maxReplicas: 10

  # Ingress: production domain + ACM cert
  - target:
      kind: Ingress
      name: nexu-ingress
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: nexu-ingress
        annotations:
          alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT_ID:certificate/CERT_ID
      spec:
        rules:
          - host: nexu.example.com
            http:
              paths:
                - path: /v1
                  pathType: Prefix
                  backend:
                    service:
                      name: nexu-api
                      port:
                        number: 3000
                - path: /api
                  pathType: Prefix
                  backend:
                    service:
                      name: nexu-api
                      port:
                        number: 3000
                - path: /health
                  pathType: Exact
                  backend:
                    service:
                      name: nexu-api
                      port:
                        number: 3000
                - path: /openapi.json
                  pathType: Exact
                  backend:
                    service:
                      name: nexu-api
                      port:
                        number: 3000
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: nexu-web
                      port:
                        number: 80

images:
  - name: nexu-api
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/nexu-api
    newTag: v1.0.0
  - name: nexu-web
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/nexu-web
    newTag: v1.0.0
  - name: nexu-gateway
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/nexu-gateway
    newTag: v1.0.0

configMapGenerator:
  - name: nexu-config
    behavior: merge
    literals:
      - WEB_URL=https://nexu.example.com
      - BETTER_AUTH_URL=https://nexu.example.com
