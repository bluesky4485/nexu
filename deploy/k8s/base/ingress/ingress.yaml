apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexu-ingress
  labels:
    app.kubernetes.io/part-of: nexu
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - host: nexu.example.com
      http:
        paths:
          # API routes
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: nexu-api
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nexu-api
                port:
                  number: 3000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: nexu-api
                port:
                  number: 3000
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: nexu-api
                port:
                  number: 3000
          # Web dashboard (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexu-web
                port:
                  number: 80
