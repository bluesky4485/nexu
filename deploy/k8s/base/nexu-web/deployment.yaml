apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexu-web
  labels:
    app.kubernetes.io/name: nexu-web
    app.kubernetes.io/part-of: nexu
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nexu-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexu-web
        app.kubernetes.io/part-of: nexu
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: nexu-web:latest
          ports:
            - containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
