apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexu-api
  labels:
    app.kubernetes.io/name: nexu-api
    app.kubernetes.io/part-of: nexu
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nexu-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexu-api
        app.kubernetes.io/part-of: nexu
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: nexu-api:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nexu-config
            - secretRef:
                name: nexu-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
